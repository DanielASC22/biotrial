<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Biotrial</title>
    <script type="text/javascript">
      // Segmented Redirect Logic
      var pathSegmentsToKeep = 1; // Set this to 1 if your repo name is in the URL (e.g., /biotrial/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
